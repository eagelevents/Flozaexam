<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Exam | Student Portal</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #fbdb32 100%);
            --text-dark: #1f2937;
            --shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f3f4f6;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .hidden { display: none !important; }

        body::before {
            content: ''; position: absolute; width: 150%; height: 150%;
            background: var(--primary-gradient); top: -50%; left: -25%;
            transform: rotate(-5deg); z-index: -1;
            border-radius: 20px;
        }

        .auth-container, .profile-card, .subject-container {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 25px;
            width: 90%; max-width: 450px; text-align: center; box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 2px solid #e5e7eb; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary-gradient); color: white; }
        .btn-accent { background: var(--accent-gradient); color: #1e3a8a; }

        .subject-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .subject-card { background: #f9fafb; padding: 20px; border-radius: 15px; border: 2px solid #e5e7eb; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 15px; }

        .exam-layout { display: flex; gap: 20px; padding: 20px; width: 95%; max-width: 1200px; height: 90vh; }
        .exam-main { flex: 2.5; background: white; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); position: relative; overflow-y: auto; }
        .exam-nav { flex: 1; background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; }

        #timer { position: absolute; top: 20px; right: 20px; background: #dc2626; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .option-btn { width: 100%; padding: 15px; background: #f3f4f6; border: 2px solid #e5e7eb; margin: 8px 0; border-radius: 10px; text-align: left; cursor: pointer; }
        .option-btn.selected { background: #3b82f6; color: white; border-color: #1e3a8a; }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(40px, 1fr)); gap: 5px; margin-top: 15px; }
        .nav-item { padding: 10px; background: #eee; border-radius: 5px; text-align: center; cursor: pointer; font-size: 12px; border: 1px solid #ddd; }
        .nav-item.done { background: #10b981; color: white; }
        .nav-item.current { border: 2px solid #1e3a8a; }
        .nav-item.flag { background: #f59e0b; color: white; }
    </style>
</head>
<body>

    <div id="step1" class="auth-container">
        <h2>Floza-Exam</h2>
        <p style="color: #6b7280;">Student Portal</p>
        <input type="text" id="stdID" placeholder="ID Number">
        <input type="password" id="stdPass" placeholder="Password">
        <button class="btn-primary" onclick="processLogin()">Login</button>
    </div>

    <div id="step2" class="profile-card hidden">
        <div id="avatar" style="font-size:50px; background:var(--accent-gradient); width:100px; height:100px; line-height:100px; border-radius:50%; margin:0 auto 20px; border: 4px solid white; color:#1e3a8a; font-weight:bold;">?</div>
        <h3 id="p-name">---</h3>
        <p id="p-id-txt">---</p>
        <button class="btn-accent" onclick="showSubjects()">Continue to Subjects</button>
    </div>

    <div id="step3" class="subject-container hidden">
        <h3>Choose a Subject</h3>
        <div id="sub-list" class="subject-grid"></div>
    </div>

    <div id="exam-ui" class="exam-layout hidden">
        <div class="exam-main">
            <div id="timer">⏱️ 00:00</div>
            <div id="q-txt" style="font-size: 20px; font-weight: bold; margin-top: 40px; line-height: 1.6;">...</div>
            <div id="opt-area"></div>
            <div style="margin-top:30px; display:flex; gap:10px;">
                <button class="btn-primary" onclick="prevQ()" style="width:auto; background:#6b7280;">Back</button>
                <button class="btn-primary" onclick="nextQ()" style="width:auto;">Next</button>
                <button class="btn-accent" onclick="toggleFlag()" style="width:auto; margin-left:auto;">🚩 Flag</button>
            </div>
        </div>
        <div class="exam-nav">
            <h4>Questions</h4>
            <div id="nav-grid" class="nav-grid"></div>
            <button class="btn-primary" onclick="finishExam()" style="background:#dc2626; margin-top:auto;">Finish Exam</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAv3J7gcURh2lT_bKspld-xFb0OJX5be3o",
            authDomain: "finote-loza-portal.firebaseapp.com",
            projectId: "finote-loza-portal",
            messagingSenderId: "406419699162",
            appId: "1:406419699162:web:c24769492e116f5fe8fce3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let student, activeQs = [], userAns = {}, flags = {}, currentIdx = 0, timeLeft, timerInterval;
        let cheatCount = 0;

        // --- 1. Auto-Save Logic (LocalStorage) ---
        function saveProgress() {
            const data = { student, activeQs, userAns, flags, currentIdx, timeLeft };
            localStorage.setItem('exam_backup', JSON.stringify(data));
        }

        // --- 2. Anti-Cheat Logic (Tab Switching) ---
        document.addEventListener("visibilitychange", () => {
            const isExamRunning = !document.getElementById('exam-ui').classList.contains('hidden');
            if (document.hidden && isExamRunning) {
                cheatCount++;
                if (cheatCount === 1) {
                    alert("⚠️Warning! You are not allowed to exit the test page. If you try again, your test will close automatically.!");
                } else {
                    alert("🚫The exam has been closed. because you broke the rules!");
                    finishExam(true);
                }
            }
        });

        // Right Click & Copy መከልከል
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u')) {
                e.preventDefault();
                alert("ይህ ተግባር የተከለከለ ነው!");
            }
        });

        window.processLogin = async () => {
            const id = document.getElementById('stdID').value.trim();
            const pass = document.getElementById('stdPass').value.trim();
            if(!id || !pass) return alert("Enter credentials!");

            const snap = await getDocs(collection(db, "students"));
            student = null;
            snap.forEach(d => { 
                const data = d.data();
                if(data.studentID === id && data.pass === pass) student = data; 
            });

            if(student) {
                // መጀመሪያ የቆየ ሴቭ የተደረገ ዳታ ካለ ያያል
                const saved = localStorage.getItem('exam_backup');
                if(saved) {
                    const parsed = JSON.parse(saved);
                    if(parsed.student.studentID === student.studentID) {
                        if(confirm("ያልተጠናቀቀ ፈተና አግኝተናል፤ ካቆምክበት መቀጠል ትፈልጋለህ?")) {
                            activeQs = parsed.activeQs; userAns = parsed.userAns;
                            flags = parsed.flags; currentIdx = parsed.currentIdx;
                            timeLeft = parsed.timeLeft;
                            resumeUI(); return;
                        } else localStorage.removeItem('exam_backup');
                    }
                }
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('p-name').innerText = student.name;
                document.getElementById('p-id-txt').innerText = "ID: " + student.studentID + " | Stream: " + student.stream;
                document.getElementById('avatar').innerText = student.name.charAt(0).toUpperCase();
            } else alert("Invalid ID or Password!");
        };

        window.showSubjects = () => {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            const s = student.stream === "Natural" ? ["Maths", "English", "Physics", "Biology", "Chemistry", "Sat"] : ["Maths", "English", "History", "Geography", "Economics", "Sat"];
            document.getElementById('sub-list').innerHTML = s.map(sub => `
                <div class="subject-card" onclick="startExam('${sub}')">
                    <div style="background:var(--accent-gradient); padding:10px; border-radius:8px;">📚</div>
                    <div><b>${sub}</b><br><small>Click to start</small></div>
                </div>`).join('');
        };

        window.startExam = async (sub) => {
            // 3. ድጋሚ መግባት መከልከያ (Check if result already exists)
            const qResult = query(collection(db, "results"), where("studentID", "==", student.studentID), where("subject", "==", sub));
            const checkSnap = await getDocs(qResult);
            if (!checkSnap.empty) return alert("🚫 You have already completed this test. You cannot retake it.!");

            const p = prompt("Enter password for " + sub + ":");
            if(!p) return;

            const snap = await getDocs(collection(db, "questions"));
            activeQs = []; let cPass = "", dur = 60;
            snap.forEach(d => {
                const q = d.data();
                if(q.subject === sub && q.stream === student.stream) { activeQs.push(q); cPass = q.pass; dur = q.duration; }
            });

            if(activeQs.length === 0) return alert("No questions found!");
            if(p !== cPass) return alert("Incorrect Code!");

            timeLeft = dur * 60;
            resumeUI();
        };

        function resumeUI() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('exam-ui').classList.remove('hidden');
            startTimer(); renderNav(); loadQ();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `⏱️ ${m}:${s<10?'0':''}${s}`;
                if(timeLeft % 5 === 0) saveProgress(); // በየ 5 ሴኮንዱ ሴቭ ያደርጋል
                if(timeLeft-- <= 0) finishExam(true);
            }, 1000);
        }

        window.loadQ = () => {
            const q = activeQs[currentIdx];
            document.getElementById('q-txt').innerText = `Question ${currentIdx+1}: ${q.q}`;
            const area = document.getElementById('opt-area'); area.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            q.opts.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = `option-btn ${userAns[currentIdx] === i ? 'selected' : ''}`;
                b.innerText = `${labels[i]}. ${o}`;
                b.onclick = () => { userAns[currentIdx] = i; loadQ(); updateNav(); saveProgress(); };
                area.appendChild(b);
            });
            updateNav();
        };

        function renderNav() {
            document.getElementById('nav-grid').innerHTML = activeQs.map((_, i) => `<div class="nav-item" id="nav-${i}" onclick="jumpTo(${i})">${i+1}</div>`).join('');
        }

        function updateNav() {
            activeQs.forEach((_, i) => {
                const el = document.getElementById('nav-'+i);
                if(el) el.className = "nav-item " + (i===currentIdx?'current ':'') + (userAns[i]!==undefined?'done ':'') + (flags[i]?'flag':'');
            });
        }

        window.jumpTo = (i) => { currentIdx = i; loadQ(); };
        window.nextQ = () => { if(currentIdx < activeQs.length-1) { currentIdx++; loadQ(); } };
        window.prevQ = () => { if(currentIdx > 0) { currentIdx--; loadQ(); } };
        window.toggleFlag = () => { flags[currentIdx] = !flags[currentIdx]; updateNav(); saveProgress(); };

        window.finishExam = async (auto = false) => {
            if(!auto && !confirm("Are you sure you want to finish?")) return;
            clearInterval(timerInterval);

            let score = 0;
            const labels = ["A", "B", "C", "D"];
            let detailed = activeQs.map((q, i) => userAns[i] !== undefined ? labels[userAns[i]] : "N/A");
            activeQs.forEach((q, i) => { if(userAns[i] === q.ans) score++; });

            try {
                await addDoc(collection(db, "results"), {
                    name: student.name, studentID: student.studentID,
                    subject: activeQs[0].subject, score, total: activeQs.length,
                    responses: detailed, date: new Date().toLocaleString(),
                    status: auto ? "Closed (Violation/Timeout)" : "Completed"
                });
                localStorage.removeItem('exam_backup'); // ሲያልቅ ሴቩን ያጠፋል
                alert(auto ? "ፈተናው ተዘግቷል!" : "በተሳካ ሁኔታ ጨርሰሃል!");
            } catch(e) { alert("Error sending results!"); }
            finally { location.reload(); }
        };
    </script>
</body>
</html>
